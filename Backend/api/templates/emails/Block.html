<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blocked User</title>
  </head>
  <body>
    <div
      class="container"
      style="
        max-width: 600px;
        margin: 20px auto;
        background-color: #ffffff;
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        font-family: sans-serif;
      "
    >
      <div
        class="header"
        style="display: flex; align-items: center; margin-bottom: 30px"
      >
        <span style="font-weight: bold; color: #333333">The Bidding Team,</span>
      </div>

      <div class="content" style="color: #333333; line-height: 1.6">
        <p style="margin: 0 0 10px 0">Hello {{ user_name }},</p>
        <p style="margin: 0 0 20px 0">
          We are blocking your account because we found some
          <strong>suspicious activity</strong> for you. we are trying to find it
          out.
        </p>

        <p style="margin: 20px 0 5px 0">Thanks,</p>
        <p style="margin: 0">
          <span style="font-weight: 600; ">The Bidding Team</span></p>
      </div>

      <div
        class="footer"
        style="
          margin-top: 40px;
          font-size: 12px;
          color: #777777;
          text-align: center;
          border-top: 1px solid #eeeeee;
          padding-top: 20px;
        "
      >
        <p style="margin: 5px 0">
          Don't reply this email. we'll get back to you quickly!
        </p>
      </div>
    </div>
  </body>
</html>
